<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
>

<title>
  Wedding Photo & Video Uploader
</title>


<style>

* {
  box-sizing: border-box;
}


body {

  margin: 0;

  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Helvetica Neue",
    "Hiragino Kaku Gothic ProN",
    "Yu Gothic",
    sans-serif;

  background:
    #f8f6f1;

  color:
    #111;

}


.container {

  max-width:
    500px;

  min-height:
    100vh;

  margin:
    0 auto;

  padding:
    40px 24px;

  display:
    flex;

  flex-direction:
    column;

  justify-content:
    center;

}


.screen {

  display:
    none;

  text-align:
    center;

}


.screen.active {

  display:
    block;

}


h1 {

  font-family:
    Georgia,
    "Times New Roman",
    serif;

  font-size:
    30px;

  font-weight:
    normal;

  letter-spacing:
    1px;

  line-height:
    1.2;

  margin:
    0 0 20px;

}


.line {

  width:
    32px;

  height:
    1px;

  background:
    #111;

  margin:
    20px auto 32px;

}


p {

  font-size:
    15px;

  line-height:
    1.8;

  margin-bottom:
    30px;

}


button {

  width:
    100%;

  border:
    none;

  border-radius:
    8px;

  padding:
    17px 20px;

  font-size:
    16px;

  cursor:
    pointer;

}


.primary {

  background:
    #111;

  color:
    #fff;

}


.secondary {

  margin-top:
    12px;

  background:
    transparent;

  color:
    #111;

  border:
    1px solid #111;

}


.video-button {

  margin-top:
    12px;

  background:
    #444;

  color:
    #fff;

}


.note {

  font-size:
    12px;

  margin-top:
    18px;

  color:
    #666;

  line-height:
    1.8;

}


#photoInput,
#videoInput {

  display:
    none;

}


/* =========================
   選択メディア
========================= */


.media-grid {

  display:
    grid;

  grid-template-columns:
    repeat(
      3,
      1fr
    );

  gap:
    8px;

  margin:
    24px 0;

}


.media-item {

  position:
    relative;

  aspect-ratio:
    1 / 1;

  overflow:
    hidden;

  border-radius:
    6px;

  background:
    #ddd;

}


.media-item img,
.media-item video {

  width:
    100%;

  height:
    100%;

  object-fit:
    cover;

}


.video-mark {

  position:
    absolute;

  top:
    50%;

  left:
    50%;

  transform:
    translate(
      -50%,
      -50%
    );

  width:
    42px;

  height:
    42px;

  border-radius:
    50%;

  background:
    rgba(
      0,
      0,
      0,
      0.7
    );

  color:
    white;

  display:
    flex;

  align-items:
    center;

  justify-content:
    center;

  font-size:
    20px;

  pointer-events:
    none;

}


.delete-btn {

  position:
    absolute;

  top:
    4px;

  right:
    4px;

  width:
    28px;

  height:
    28px;

  padding:
    0;

  border-radius:
    50%;

  background:
    rgba(
      0,
      0,
      0,
      0.8
    );

  color:
    #fff;

  font-size:
    17px;

  z-index:
    10;

}


.count {

  margin:
    12px 0;

  font-size:
    14px;

}


/* =========================
   アップロード
========================= */


.upload-icon {

  font-size:
    60px;

  margin:
    30px 0;

}


.progress-area {

  margin:
    30px 0;

}


.progress-bar {

  width:
    100%;

  height:
    10px;

  background:
    #ddd;

  border-radius:
    10px;

  overflow:
    hidden;

}


.progress {

  width:
    0%;

  height:
    100%;

  background:
    #111;

  transition:
    width 0.3s;

}


.progress-text {

  margin-top:
    15px;

  font-size:
    18px;

}


.heart {

  font-size:
    60px;

  margin:
    30px 0;

}


.error {

  color:
    #b00020;

  font-size:
    14px;

  margin-top:
    20px;

  line-height:
    1.7;

}


/* =========================
   ギャラリー
========================= */


.gallery-grid {

  display:
    grid;

  grid-template-columns:
    repeat(
      3,
      1fr
    );

  gap:
    4px;

  margin:
    24px 0;

}


.gallery-item {

  position:
    relative;

  aspect-ratio:
    1 / 1;

  overflow:
    hidden;

  background:
    #eee;

}


.gallery-item img {

  width:
    100%;

  height:
    100%;

  object-fit:
    cover;

  display:
    block;

  cursor:
    pointer;

}


.gallery-video-icon {

  position:
    absolute;

  top:
    50%;

  left:
    50%;

  transform:
    translate(
      -50%,
      -50%
    );

  width:
    44px;

  height:
    44px;

  border-radius:
    50%;

  background:
    rgba(
      0,
      0,
      0,
      0.72
    );

  color:
    white;

  display:
    flex;

  align-items:
    center;

  justify-content:
    center;

  font-size:
    20px;

  pointer-events:
    none;

}


.gallery-delete {

  position:
    absolute;

  top:
    5px;

  right:
    5px;

  width:
    30px;

  height:
    30px;

  padding:
    0;

  border-radius:
    50%;

  background:
    rgba(
      0,
      0,
      0,
      0.78
    );

  color:
    white;

  font-size:
    16px;

  z-index:
    10;

}


.gallery-loading,
.gallery-empty {

  padding:
    50px 0;

  font-size:
    14px;

  color:
    #666;

}


/* =========================
   写真モーダル
========================= */


.modal {

  display:
    none;

  position:
    fixed;

  z-index:
    1000;

  inset:
    0;

  width:
    100%;

  height:
    100%;

  background:
    rgba(
      0,
      0,
      0,
      0.95
    );

  align-items:
    center;

  justify-content:
    center;

}


.modal.active {

    flex;

}


.modal img {

  max-width:
    95%;

  max-height:
    90%;

  object-fit:
    contain;

}


.modal-close {

  position:
    absolute;

  top:
    20px;

  right:
    20px;

  width:
    44px;

  height:
    44px;

  padding:
    0;

  border-radius:
    50%;

  background:
    #fff;

  color:
    #000;

  font-size:
    25px;

  z-index:
    1002;

}


/* =========================
   動画モーダル
========================= */


.video-modal-content {

  width:
    95%;

  max-width:
    900px;

  height:
    75vh;

  background:
    black;

}


.video-modal-content iframe {

  width:
    100%;

  height:
    100%;

  border:
    0;

}

</style>

</head>

<script>


/* ==========================================
   設定
========================================== */


const API_URL =
  'https://script.google.com/macros/s/AKfycbzIpzbY8ZUbA0z2ct2ynJBCaWHS5CUe6Fk7FqEvnerV028Pprw6xPr1uOVQfnRYXjmR/exec';


const MAX_PHOTOS =
  30;


const MAX_VIDEOS =
  3;


// 20MB
const VIDEO_MAX_BYTES =
  20
  *
  1024
  *
  1024;


// 写真3枚並列
const PHOTO_PARALLEL_UPLOADS =
  3;


// 動画1本ずつ
const VIDEO_PARALLEL_UPLOADS =
  1;


let selectedPhotos =
  [];


let selectedVideos =
  [];


/* ==========================================
   投稿者ID
========================================== */


function getUploaderId() {


  const storageKey =
    'weddingUploaderId';


  let uploaderId =
    localStorage.getItem(
      storageKey
    );


  if (
    !uploaderId
  ) {


    uploaderId =

      'guest_'

      +

      Date.now()

      +

      '_'

      +

      Math.random()
        .toString(
          36
        )
        .substring(
          2,
          12
        );


    localStorage.setItem(
      storageKey,
      uploaderId
    );


  }


  return uploaderId;

}


const UPLOADER_ID =
  getUploaderId();


/* ==========================================
   ファイル選択
========================================== */


document
  .getElementById(
    'photoInput'
  )
  .addEventListener(
    'change',
    handlePhotoSelect
  );


document
  .getElementById(
    'videoInput'
  )
  .addEventListener(
    'change',
    handleVideoSelect
  );


function handlePhotoSelect(
  event
) {


  const files =
    Array.from(
      event.target.files
    );


  files.forEach(
    file => {


      if (
        !file.type
          .startsWith(
            'image/'
          )
      ) {

        return;

      }


      if (
        selectedPhotos.length
        <
        MAX_PHOTOS
      ) {


        selectedPhotos.push(
          file
        );


      }


    }
  );


  event.target.value =
    '';


  renderPreview();

}


function handleVideoSelect(
  event
) {


  const files =
    Array.from(
      event.target.files
    );


  let sizeError =
    false;


  files.forEach(
    file => {


      if (
        !file.type
          .startsWith(
            'video/'
          )
      ) {

        return;

      }


      if (
        file.size
        >
        VIDEO_MAX_BYTES
      ) {


        sizeError =
          true;


        return;

      }


      if (
        selectedVideos.length
        <
        MAX_VIDEOS
      ) {


        selectedVideos.push(
          file
        );


      }


    }
  );


  event.target.value =
    '';


  if (
    sizeError
  ) {


    alert(
      '20MBを超える動画はアップロードできません。'
    );


  }


  renderPreview();

}


/* ==========================================
   プレビュー
========================================== */


function renderPreview() {


  if (
    selectedPhotos.length
    ===
    0

    &&

    selectedVideos.length
    ===
    0
  ) {


    showScreen(
      'selectScreen'
    );


    return;

  }


  const grid =
    document
      .getElementById(
        'mediaGrid'
      );


  grid.innerHTML =
    '';


  // 写真
  selectedPhotos.forEach(

    (
      file,
      index
    ) => {


      const item =
        document
          .createElement(
            'div'
          );


      item.className =
        'media-item';


      const img =
        document
          .createElement(
            'img'
          );


      img.src =
        URL
          .createObjectURL(
            file
          );


      const deleteButton =
        createPreviewDeleteButton(
          () => {


            selectedPhotos.splice(
              index,
              1
            );


            renderPreview();


          }
        );


      item.appendChild(
        img
      );


      item.appendChild(
        deleteButton
      );


      grid.appendChild(
        item
      );


    }

  );


  // 動画
  selectedVideos.forEach(

    (
      file,
      index
    ) => {


      const item =
        document
          .createElement(
            'div'
          );


      item.className =
        'media-item';


      const video =
        document
          .createElement(
            'video'
          );


      video.src =
        URL
          .createObjectURL(
            file
          );


      video.muted =
        true;


      video.preload =
        'metadata';


      const mark =
        document
          .createElement(
            'div'
          );


      mark.className =
        'video-mark';


      mark.textContent =
        '▶';


      const deleteButton =
        createPreviewDeleteButton(
          () => {


            selectedVideos.splice(
              index,
              1
            );


            renderPreview();


          }
        );


      item.appendChild(
        video
      );


      item.appendChild(
        mark
      );


      item.appendChild(
        deleteButton
      );


      grid.appendChild(
        item
      );


    }

  );


  document
    .getElementById(
      'mediaCount'
    )
    .textContent =

    '写真 '

    +

    selectedPhotos.length

    +

    '枚 / 動画 '

    +

    selectedVideos.length

    +

    '本';


  showScreen(
    'confirmScreen'
  );

}


function createPreviewDeleteButton(
  callback
) {


  const button =
    document
      .createElement(
        'button'
      );


  button.className =
    'delete-btn';


  button.textContent =
    '×';


  button.onclick =
    callback;


  return button;

}


/* ==========================================
   画面
========================================== */


function showScreen(
  screenId
) {


  document
    .querySelectorAll(
      '.screen'
    )
    .forEach(

      screen => {


        screen
          .classList
          .remove(
            'active'
          );


      }

    );


  document
    .getElementById(
      screenId
    )
    .classList
    .add(
      'active'
    );


  window.scrollTo(
    0,
    0
  );

}


/* ==========================================
   アップロード
========================================== */


async function startUpload() {


  const total =

    selectedPhotos.length

    +

    selectedVideos.length;


  if (
    total
    ===
    0
  ) {


    return;


  }


  showScreen(
    'uploadScreen'
  );


  document
    .getElementById(
      'errorMessage'
    )
    .textContent =
    '';


  let completed =
    0;


  let failed =
    false;


  function updateProgress() {


    const percent =
      Math.round(

        completed
        /
        total
        *
        100

      );


    document
      .getElementById(
        'progress'
      )
      .style
      .width =

      percent

      +

      '%';


    document
      .getElementById(
        'progressText'
      )
      .textContent =

      percent

      +

      '%';


    document
      .getElementById(
        'progressCount'
      )
      .textContent =

      total

      +

      '件中 '

      +

      completed

      +

      '件完了';


  }


  updateProgress();


  // ========================================
  // 写真：3枚並列
  // ========================================

  const photoResult =
    await uploadFilesWithConcurrency(

      [
        ...selectedPhotos
      ],

      PHOTO_PARALLEL_UPLOADS,

      () => {


        completed++;


        updateProgress();


      }

    );


  if (
    !photoResult
  ) {


    failed =
      true;


  }


  // ========================================
  // 動画：1本ずつ
  // ========================================

  if (
    !failed
  ) {


    const videoResult =
      await uploadFilesWithConcurrency(

        [
          ...selectedVideos
        ],

        VIDEO_PARALLEL_UPLOADS,

        () => {


          completed++;


          updateProgress();


        }

      );


    if (
      !videoResult
    ) {


      failed =
        true;


    }


  }


  if (
    failed
  ) {


    document
      .getElementById(
        'errorMessage'
      )
      .textContent =

      '一部のファイルのアップロードに失敗しました。通信環境をご確認ください。';


    return;


  }


  showScreen(
    'completeScreen'
  );

}


/* ==========================================
   並列アップロード制御
========================================== */


async function uploadFilesWithConcurrency(

  files,

  concurrency,

  onComplete

) {


  if (
    files.length
    ===
    0
  ) {


    return true;


  }


  let currentIndex =
    0;


  let failed =
    false;


  async function worker() {


    while (
      true
    ) {


      const index =
        currentIndex;


      currentIndex++;


      if (
        index
        >=
        files.length
      ) {


        return;


      }


      const file =
        files[
          index
        ];


      try {


        const base64 =
          await fileToBase64(
            file
          );


        await uploadSingleFile(

          base64,

          file.name,

          file.type

        );


        onComplete();


      } catch (
        error
      ) {


        console.error(
          error
        );


        failed =
          true;


        return;


      }


    }

  }


  const workers =
    [];


  for (

    let i =
      0;

    i
    <
    Math.min(
      concurrency,
      files.length
    );

    i++

  ) {


    workers.push(
      worker()
    );


  }


  await Promise.all(
    workers
  );


  return !failed;

}


/* ==========================================
   Base64
========================================== */


function fileToBase64(
  file
) {


  return new Promise(

    (
      resolve,
      reject
    ) => {


      const reader =
        new FileReader();


      reader.onload =
        () => {


          resolve(

            reader
              .result
              .split(
                ','
              )[1]

          );


        };


      reader.onerror =
        reject;


      reader.readAsDataURL(
        file
      );


    }

  );

}


/* ==========================================
   アップロード通信
========================================== */


async function uploadSingleFile(

  base64,

  fileName,

  mimeType

) {


  const body =
    new URLSearchParams();


  body.append(
    'action',
    'upload'
  );


  body.append(
    'fileData',
    base64
  );


  body.append(
    'fileName',
    fileName
  );


  body.append(
    'mimeType',
    mimeType
  );


  body.append(
    'uploaderId',
    UPLOADER_ID
  );


  await fetch(

    API_URL,

    {

      method:
        'POST',

      mode:
        'no-cors',

      headers: {

        'Content-Type':
          'application/x-www-form-urlencoded'

      },

      body:
        body.toString()

    }

  );

}


/* ==========================================
   ギャラリー
========================================== */


function openGallery() {


  showScreen(
    'galleryScreen'
  );


  const grid =
    document
      .getElementById(
        'galleryGrid'
      );


  const loading =
    document
      .getElementById(
        'galleryLoading'
      );


  const empty =
    document
      .getElementById(
        'galleryEmpty'
      );


  grid.innerHTML =
    '';


  loading.style.display =
    'block';


  empty.style.display =
    'none';


  const oldScript =
    document
      .getElementById(
        'galleryJsonp'
      );


  if (
    oldScript
  ) {


    oldScript.remove();


  }


  const script =
    document
      .createElement(
        'script'
      );


  script.id =
    'galleryJsonp';


  script.src =

    API_URL

    +

    '?action=gallery'

    +

    '&uploaderId='

    +

    encodeURIComponent(
      UPLOADER_ID
    )

    +

    '&callback=renderGallery'

    +

    '&t='

    +

    Date.now();


  script.onerror =
    () => {


      loading.style.display =
        'none';


      empty.style.display =
        'block';


      empty.textContent =
        '読み込みに失敗しました';


    };


  document.body
    .appendChild(
      script
    );

}


/* ==========================================
   ギャラリー描画
========================================== */


function renderGallery(
  result
) {


  const grid =
    document
      .getElementById(
        'galleryGrid'
      );


  const loading =
    document
      .getElementById(
        'galleryLoading'
      );


  const empty =
    document
      .getElementById(
        'galleryEmpty'
      );


  loading.style.display =
    'none';


  if (
    !result
    ||
    !result.success
    ||
    !result.media
    ||
    result.media.length
    ===
    0
  ) {


    empty.style.display =
      'block';


    return;


  }


  result.media.forEach(

    media => {


      const item =
        document
          .createElement(
            'div'
          );


      item.className =
        'gallery-item';


      const img =
        document
          .createElement(
            'img'
          );


      img.src =

        'https://drive.google.com/thumbnail'

        +

        '?id='

        +

        encodeURIComponent(
          media.id
        )

        +

        '&sz=w600';


      img.loading =
        'lazy';


      // 写真
      if (
        media.type
        ===
        'image'
      ) {


        img.onclick =
          () => {


            openImageModal(

              'https://drive.google.com/thumbnail'

              +

              '?id='

              +

              encodeURIComponent(
                media.id
              )

              +

              '&sz=w2000'

            );


          };


      }


      // 動画
      if (
        media.type
        ===
        'video'
      ) {


        img.onclick =
          () => {


            openVideoModal(
              media.id
            );


          };


      }


      item.appendChild(
        img
      );


      // 動画アイコン
      if (
        media.type
        ===
        'video'
      ) {


        const play =
          document
            .createElement(
              'div'
            );


        play.className =
          'gallery-video-icon';


        play.textContent =
          '▶';


        item.appendChild(
          play
        );


      }


      // 自分の投稿だけ削除可能
      if (
        media.canDelete
      ) {


        const deleteButton =
          document
            .createElement(
              'button'
            );


        deleteButton.className =
          'gallery-delete';


        deleteButton.textContent =
          '×';


        deleteButton.onclick =
          event => {


            event.stopPropagation();


            confirmDeleteMedia(
              media.id
            );


          };


        item.appendChild(
          deleteButton
        );


      }


      grid.appendChild(
        item
      );


    }

  );

}


/* ==========================================
   削除
========================================== */


function confirmDeleteMedia(
  fileId
) {


  const confirmed =
    window.confirm(

      'この写真・動画を削除しますか？\n\n削除後はギャラリーから表示されなくなります。'

    );


  if (
    !confirmed
  ) {


    return;


  }


  deleteMedia(
    fileId
  );

}


function deleteMedia(
  fileId
) {


  const callbackName =

    'deleteCallback_'

    +

    Date.now()

    +

    '_'

    +

    Math.random()
      .toString(
        36
      )
      .substring(
        2,
        8
      );


  window[
    callbackName
  ] =

    function(
      result
    ) {


      const script =
        document
          .getElementById(
            callbackName
          );


      if (
        script
      ) {


        script.remove();


      }


      delete window[
        callbackName
      ];


      if (
        !result
        ||
        !result.success
      ) {


        alert(

          result
          &&
          result.message

          ?

          result.message

          :

          '削除に失敗しました。'

        );


        return;


      }


      openGallery();


    };


  const script =
    document
      .createElement(
        'script'
      );


  script.id =
    callbackName;


  script.src =

    API_URL

    +

    '?action=delete'

    +

    '&fileId='

    +

    encodeURIComponent(
      fileId
    )

    +

    '&uploaderId='

    +

    encodeURIComponent(
      UPLOADER_ID
    )

    +

    '&callback='

    +

    encodeURIComponent(
      callbackName
    )

    +

    '&t='

    +

    Date.now();


  document.body
    .appendChild(
      script
    );

}


/* ==========================================
   写真表示
========================================== */


function openImageModal(
  imageUrl
) {


  document
    .getElementById(
      'modalImage'
    )
    .src =
    imageUrl;


  document
    .getElementById(
      'imageModal'
    )
    .classList
    .add(
      'active'
    );

}


function closeImageModal() {


  document
    .getElementById(
      'imageModal'
    )
    .classList
    .remove(
      'active'
    );


}


function closeImageModalBackground(
  event
) {


  if (
    event.target.id
    ===
    'imageModal'
  ) {


    closeImageModal();


  }


}


/* ==========================================
   動画再生
========================================== */


function openVideoModal(
  fileId
) {


  const url =

    'https://drive.google.com/file/d/'

    +

    encodeURIComponent(
      fileId
    )

    +

    '/preview';


  document
    .getElementById(
      'videoFrame'
    )
    .src =
    url;


  document
    .getElementById(
      'videoModal'
    )
    .classList
    .add(
      'active'
    );

}


function closeVideoModal() {


  document
    .getElementById(
      'videoModal'
    )
    .classList
    .remove(
      'active'
    );


  // 再生を止める
  document
    .getElementById(
      'videoFrame'
    )
    .src =
    '';


}

   リセット
========================================== */


function resetApp() {


  selectedPhotos =
    [];


  selectedVideos =
    [];


  document
    .getElementById(
      'mediaGrid'
    )
    .innerHTML =
    '';


  document
    .getElementById(
      'progress'
    )
    .style
    .width =
    '0%';


  document
    .getElementById(
      'progressText'
    )
    .textContent =
    '0%';


  document
    .getElementById(
      'progressCount'
    )
    .textContent =
    '0件中 0件完了';


  showScreen(
    'selectScreen'
  );


}
