<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
>

<title>Wedding Photo & Video Uploader</title>


<style>

* {
  box-sizing: border-box;
}

body {
  margin: 0;

  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Helvetica Neue",
    "Hiragino Kaku Gothic ProN",
    "Yu Gothic",
    sans-serif;

  background: #f8f6f1;

  color: #111;
}


.container {
  max-width: 500px;

  min-height: 100vh;

  margin: 0 auto;

  padding: 40px 24px;

  display: flex;

  flex-direction: column;

  justify-content: center;
}


.screen {
  display: none;

  text-align: center;
}


.screen.active {
  display: block;
}


h1 {
  font-family:
    Georgia,
    "Times New Roman",
    serif;

  font-size: 30px;

  font-weight: normal;

  letter-spacing: 1px;

  line-height: 1.2;

  margin: 0 0 20px;
}


.line {
  width: 32px;

  height: 1px;

  background: #111;

  margin: 20px auto 32px;
}


p {
  font-size: 15px;

  line-height: 1.8;

  margin-bottom: 30px;
}


button {
  width: 100%;

  border: none;

  border-radius: 8px;

  padding: 17px 20px;

  font-size: 16px;

  cursor: pointer;
}


.primary {
  background: #111;

  color: #fff;
}


.video-button {
  margin-top: 12px;

  background: #444;

  color: #fff;
}


.secondary {
  margin-top: 12px;

  background: transparent;

  color: #111;

  border: 1px solid #111;
}


.note {
  font-size: 12px;

  margin-top: 18px;

  color: #666;

  line-height: 1.8;
}


#photoInput,
#videoInput {
  display: none;
}


/* =========================================
   選択メディア
========================================= */


.media-grid {
  display: grid;

  grid-template-columns:
    repeat(3, 1fr);

  gap: 8px;

  margin: 24px 0;
}


.media-item {
  position: relative;

  aspect-ratio: 1 / 1;

  overflow: hidden;

  border-radius: 6px;

  background: #ddd;
}


.media-item img,
.media-item video {
  width: 100%;

  height: 100%;

  object-fit: cover;
}


.video-mark {
  position: absolute;

  top: 50%;

  left: 50%;

  transform:
    translate(-50%, -50%);

  width: 42px;

  height: 42px;

  border-radius: 50%;

  background:
    rgba(0, 0, 0, 0.7);

  color: #fff;

  display: flex;

  align-items: center;

  justify-content: center;

  font-size: 20px;

  pointer-events: none;
}


.delete-btn {
  position: absolute;

  top: 4px;

  right: 4px;

  width: 28px;

  height: 28px;

  padding: 0;

  border-radius: 50%;

  background:
    rgba(0, 0, 0, 0.8);

  color: #fff;

  font-size: 17px;

  z-index: 10;
}


.count {
  margin: 12px 0;

  font-size: 14px;
}


/* =========================================
   アップロード
========================================= */


.upload-icon {
  font-size: 60px;

  margin: 30px 0;
}


.progress-area {
  margin: 30px 0;
}


.progress-bar {
  width: 100%;

  height: 10px;

  background: #ddd;

  border-radius: 10px;

  overflow: hidden;
}


.progress {
  width: 0%;

  height: 100%;

  background: #111;

  transition:
    width 0.2s ease;
}


.progress-text {
  margin-top: 15px;

  font-size: 18px;
}


.progress-size {
  margin-top: 8px;

  font-size: 13px;

  color: #666;
}


.upload-status {
  margin-top: 12px;

  font-size: 14px;
}


.heart {
  font-size: 60px;

  margin: 30px 0;
}


.error {
  color: #b00020;

  font-size: 14px;

  margin-top: 20px;

  line-height: 1.7;
}


/* =========================================
   ギャラリー
========================================= */


.gallery-grid {
  display: grid;

  grid-template-columns:
    repeat(3, 1fr);

  gap: 4px;

  margin: 24px 0;
}


.gallery-item {
  position: relative;

  aspect-ratio: 1 / 1;

  overflow: hidden;

  background: #eee;
}


.gallery-item img,
.gallery-item video {
  width: 100%;

  height: 100%;

  object-fit: cover;

  display: block;

  cursor: pointer;
}


.gallery-video-icon {
  position: absolute;

  top: 50%;

  left: 50%;

  transform:
    translate(-50%, -50%);

  width: 44px;

  height: 44px;

  border-radius: 50%;

  background:
    rgba(0, 0, 0, 0.72);

  color: white;

  display: flex;

  align-items: center;

  justify-content: center;

  font-size: 20px;

  pointer-events: none;
}


.gallery-delete {
  position: absolute;

  top: 5px;

  right: 5px;

  width: 30px;

  height: 30px;

  padding: 0;

  border-radius: 50%;

  background:
    rgba(0, 0, 0, 0.78);

  color: white;

  font-size: 16px;

  z-index: 20;
}


.gallery-loading,
.gallery-empty {
  padding: 50px 0;

  font-size: 14px;

  color: #666;
}


/* =========================================
   ダウンロード選択モード
========================================= */


.gallery-item.selection-mode {
  cursor: pointer;
}


.gallery-item.selection-mode::after {
  content: "";

  position: absolute;

  inset: 0;

  background:
    rgba(0, 0, 0, 0.12);

  pointer-events: none;

  z-index: 5;
}


.gallery-item.selected::after {
  background:
    rgba(0, 0, 0, 0.4);
}


.selection-check {
  display: none;

  position: absolute;

  top: 7px;

  left: 7px;

  width: 28px;

  height: 28px;

  border-radius: 50%;

  border: 2px solid #fff;

  background:
    rgba(0, 0, 0, 0.45);

  color: #fff;

  align-items: center;

  justify-content: center;

  font-size: 17px;

  font-weight: bold;

  z-index: 15;
}


.gallery-item.selection-mode
.selection-check {
  display: flex;
}


.gallery-item.selected
.selection-check {
  background: #111;
}


.download-panel {
  display: none;

  margin-top: 16px;

  padding: 16px;

  border: 1px solid #ddd;

  border-radius: 8px;

  background: #fff;
}


.download-panel.active {
  display: block;
}


.download-count {
  margin-bottom: 12px;

  font-size: 14px;

  font-weight: 500;
}


.download-progress {
  margin-top: 12px;

  font-size: 13px;

  color: #666;
}


/* =========================================
   モーダル
========================================= */


.modal {
  display: none;

  position: fixed;

  z-index: 1000;

  inset: 0;

  width: 100%;

  height: 100%;

  background:
    rgba(0, 0, 0, 0.95);

  align-items: center;

  justify-content: center;
}


.modal.active {
  display: flex;
}


.modal img {
  max-width: 95%;

  max-height: 90%;

  object-fit: contain;
}


.modal video {
  width: 95%;

  max-width: 900px;

  max-height: 85vh;

  background: #000;
}


.modal-close {
  position: absolute;

  top: 20px;

  right: 20px;

  width: 44px;

  height: 44px;

  padding: 0;

  border-radius: 50%;

  background: #fff;

  color: #000;

  font-size: 25px;

  z-index: 1002;
}
/* =========================================
   トップページ
   背景画像＋透明クリックエリア
========================================= */

body:has(#selectScreen.active) {
  overflow: hidden;
}

#selectScreen.top-visual {
  position: fixed;
  inset: 0;

  z-index: 100;

  width: 100vw;
  height: 100dvh;

  margin: 0;
  padding: 0;

  overflow: hidden;

  background: #eee4d7;
}


/* 背景画像 */
.top-background {
  position: absolute;

  top: 50%;
  left: 50%;

  display: block;

  width: auto;
  height: 100dvh;

  max-width: 100vw;
  max-height: 100dvh;

  transform: translate(-50%, -50%);

  object-fit: contain;

  user-select: none;
  -webkit-user-select: none;

  pointer-events: none;
}


/* 透明クリックエリア */
.top-hit-area {
  position: absolute;

  left: 50%;

  margin: 0;
  padding: 0;

  border: none;
  border-radius: 18px;

  background: transparent;

  transform: translateX(-50%);

  cursor: pointer;

  z-index: 5;

  -webkit-tap-highlight-color: transparent;
}


/* 写真 */
.photo-area {
  top: 42.9%;
  width: min(73.6vw, 368px);
  height: 12.4%;
}


/* 動画 */
.video-area {
  top: 56.6%;
  width: min(73.6vw, 368px);
  height: 12.4%;
}


/* ギャラリー */
.gallery-area {
  top: 70.3%;
  width: min(73.6vw, 368px);
  height: 9.6%;
}


.top-hit-area:focus-visible {
  outline: 3px solid rgba(160, 125, 78, 0.65);
  outline-offset: 2px;
}
  
</style>

</head>

<script>


/* =========================================================
   API設定
========================================================= */


const APPS_SCRIPT_URL =
  'https://script.google.com/macros/s/AKfycbzIpzbY8ZUbA0z2ct2ynJBCaWHS5CUe6Fk7FqEvnerV028Pprw6xPr1uOVQfnRYXjmR/exec';


const WORKER_URL =
  'https://wedding-media-api.youkey-nakatani.workers.dev';



/* =========================================================
   制限
========================================================= */


const MAX_PHOTOS =
  30;


const MAX_VIDEOS =
  3;


const VIDEO_MAX_BYTES =
  500
  *
  1024
  *
  1024;


/*
 * R2 Multipart
 * 25MiB
 */
const VIDEO_CHUNK_SIZE =
  25
  *
  1024
  *
  1024;


/*
 * 写真3枚並列
 */
const PHOTO_PARALLEL_UPLOADS =
  3;



/* =========================================================
   状態
========================================================= */


let selectedPhotos =
  [];


let selectedVideos =
  [];


let currentGalleryMedia =
  [];


let selectionMode =
  false;


const selectedDownloadItems =
  new Set();



/* =========================================================
   投稿者ID
========================================================= */


function getUploaderId() {


  const storageKey =
    'weddingUploaderId';


  let uploaderId =
    localStorage
      .getItem(
        storageKey
      );


  if (
    !uploaderId
  ) {


    uploaderId =

      'guest_'

      +

      Date.now()

      +

      '_'

      +

      Math.random()
        .toString(36)
        .substring(
          2,
          12
        );


    localStorage
      .setItem(

        storageKey,

        uploaderId

      );

  }


  return uploaderId;

}


const UPLOADER_ID =
  getUploaderId();



/* =========================================================
   ファイル選択
========================================================= */


document
  .getElementById(
    'photoInput'
  )
  .addEventListener(

    'change',

    handlePhotoSelect

  );


document
  .getElementById(
    'videoInput'
  )
  .addEventListener(

    'change',

    handleVideoSelect

  );



function handlePhotoSelect(
  event
) {


  const files =
    Array.from(
      event.target.files
    );


  files.forEach(
    file => {


      if (
        !file.type
          .startsWith(
            'image/'
          )
      ) {

        return;

      }


      if (
        selectedPhotos.length
        <
        MAX_PHOTOS
      ) {


        selectedPhotos.push(
          file
        );


      }


    }
  );


  event.target.value =
    '';


  renderPreview();

}



function handleVideoSelect(
  event
) {


  const files =
    Array.from(
      event.target.files
    );


  let sizeError =
    false;


  files.forEach(
    file => {


      if (
        !file.type
          .startsWith(
            'video/'
          )
      ) {

        return;

      }


      if (
        file.size
        >
        VIDEO_MAX_BYTES
      ) {


        sizeError =
          true;


        return;

      }


      if (
        selectedVideos.length
        <
        MAX_VIDEOS
      ) {


        selectedVideos.push(
          file
        );


      }


    }
  );


  event.target.value =
    '';


  if (
    sizeError
  ) {


    alert(
      '500MBを超える動画はアップロードできません。'
    );


  }


  renderPreview();

}



/* =========================================================
   選択プレビュー
========================================================= */


function renderPreview() {


  if (

    selectedPhotos.length === 0

    &&

    selectedVideos.length === 0

  ) {


    showScreen(
      'selectScreen'
    );


    return;

  }


  const grid =
    document
      .getElementById(
        'mediaGrid'
      );


  grid.innerHTML =
    '';


  /*
   * 写真
   */

  selectedPhotos.forEach(

    (
      file,
      index
    ) => {


      const item =
        document
          .createElement(
            'div'
          );


      item.className =
        'media-item';


      const img =
        document
          .createElement(
            'img'
          );


      img.src =
        URL
          .createObjectURL(
            file
          );


      const deleteButton =
        createPreviewDeleteButton(

          () => {


            selectedPhotos.splice(

              index,

              1

            );


            renderPreview();


          }

        );


      item.appendChild(
        img
      );


      item.appendChild(
        deleteButton
      );


      grid.appendChild(
        item
      );


    }

  );


  /*
   * 動画
   */

  selectedVideos.forEach(

    (
      file,
      index
    ) => {


      const item =
        document
          .createElement(
            'div'
          );


      item.className =
        'media-item';


      const video =
        document
          .createElement(
            'video'
          );


      video.src =
        URL
          .createObjectURL(
            file
          );


      video.muted =
        true;


      video.playsInline =
        true;


      video.preload =
        'metadata';


      const mark =
        document
          .createElement(
            'div'
          );


      mark.className =
        'video-mark';


      mark.textContent =
        '▶';


      const deleteButton =
        createPreviewDeleteButton(

          () => {


            selectedVideos.splice(

              index,

              1

            );


            renderPreview();


          }

        );


      item.appendChild(
        video
      );


      item.appendChild(
        mark
      );


      item.appendChild(
        deleteButton
      );


      grid.appendChild(
        item
      );


    }

  );


  document
    .getElementById(
      'mediaCount'
    )
    .textContent =

    '写真 '

    +

    selectedPhotos.length

    +

    '枚 / 動画 '

    +

    selectedVideos.length

    +

    '本';


  showScreen(
    'confirmScreen'
  );

}



function createPreviewDeleteButton(
  callback
) {


  const button =
    document
      .createElement(
        'button'
      );


  button.className =
    'delete-btn';


  button.textContent =
    '×';


  button.onclick =
    callback;


  return button;

}



/* =========================================================
   画面切替
========================================================= */


function showScreen(
  screenId
) {


  document
    .querySelectorAll(
      '.screen'
    )
    .forEach(

      screen => {


        screen
          .classList
          .remove(
            'active'
          );


      }

    );


  document
    .getElementById(
      screenId
    )
    .classList
    .add(
      'active'
    );


  window.scrollTo(
    0,
    0
  );

}



/* =========================================================
   アップロード
========================================================= */


async function startUpload() {


  const allFiles =
    [

      ...selectedPhotos,

      ...selectedVideos

    ];


  const totalCount =
    allFiles.length;


  if (
    totalCount ===
    0
  ) {

    return;

  }


  showScreen(
    'uploadScreen'
  );


  document
    .getElementById(
      'errorMessage'
    )
    .textContent =
    '';


  const totalBytes =
    allFiles
      .reduce(

        (
          sum,
          file
        ) => {

          return (
            sum
            +
            file.size
          );

        },

        0

      );


  const progressMap =
    new Map();


  allFiles.forEach(

    file => {


      progressMap.set(

        file,

        0

      );


    }

  );


  let completedCount =
    0;



  function updateOverallProgress() {


    let uploadedBytes =
      0;


    progressMap.forEach(

      value => {


        uploadedBytes +=
          value;


      }

    );


    const percent =

      totalBytes > 0

      ?

      Math.min(

        99,

        Math.round(

          uploadedBytes

          /

          totalBytes

          *

          100

        )

      )

      :

      0;


    document
      .getElementById(
        'progress'
      )
      .style
      .width =

      percent

      +

      '%';


    document
      .getElementById(
        'progressText'
      )
      .textContent =

      percent

      +

      '%';


    document
      .getElementById(
        'progressSize'
      )
      .textContent =

      formatBytes(
        uploadedBytes
      )

      +

      ' / '

      +

      formatBytes(
        totalBytes
      );


    document
      .getElementById(
        'progressCount'
      )
      .textContent =

      totalCount

      +

      '件中 '

      +

      completedCount

      +

      '件完了';

  }


  updateOverallProgress();


  try {


    /*
     * 写真
     */

    if (
      selectedPhotos.length
      >
      0
    ) {


      document
        .getElementById(
          'uploadStatus'
        )
        .textContent =
        '写真をアップロードしています...';


      await uploadPhotos(

        selectedPhotos,

        progressMap,

        () => {


          completedCount++;


          updateOverallProgress();


        },

        updateOverallProgress

      );


    }


    /*
     * 動画
     */

    for (
      const video
      of
      selectedVideos
    ) {


      document
        .getElementById(
          'uploadStatus'
        )
        .textContent =

        '動画をアップロードしています：'

        +

        video.name;


      /*
       * 動画サムネイル生成
       *
       * 失敗しても
       * 動画アップロードは継続
       */

      let thumbnailBlob =
        null;


      try {


        thumbnailBlob =
          await createVideoThumbnail(
            video
          );


      } catch (
        error
      ) {


        console.warn(

          'Thumbnail generation failed',

          error

        );


      }


      /*
       * 動画本体アップロード
       */

      const uploadResult =
        await uploadVideoMultipart(

          video,

          bytesUploaded => {


            progressMap.set(

              video,

              bytesUploaded

            );


            updateOverallProgress();


          }

        );


      /*
       * サムネイルをR2へ送信
       */

      if (
        thumbnailBlob
        &&
        uploadResult
        &&
        uploadResult.key
      ) {


        try {


          document
            .getElementById(
              'uploadStatus'
            )
            .textContent =

            '動画のサムネイルを作成しています...';


          await uploadThumbnail(

            uploadResult.key,

            thumbnailBlob

          );


        } catch (
          error
        ) {


          console.warn(

            'Thumbnail upload failed',

            error

          );


        }


      }


      progressMap.set(

        video,

        video.size

      );


      completedCount++;


      updateOverallProgress();


    }


    /*
     * 完了
     */

    document
      .getElementById(
        'progress'
      )
      .style
      .width =
      '100%';


    document
      .getElementById(
        'progressText'
      )
      .textContent =
      '100%';


    document
      .getElementById(
        'progressSize'
      )
      .textContent =

      formatBytes(
        totalBytes
      )

      +

      ' / '

      +

      formatBytes(
        totalBytes
      );


    document
      .getElementById(
        'progressCount'
      )
      .textContent =

      totalCount

      +

      '件中 '

      +

      totalCount

      +

      '件完了';


    document
      .getElementById(
        'uploadStatus'
      )
      .textContent =
      'アップロード完了！';


    await sleep(
      500
    );


    showScreen(
      'completeScreen'
    );


  } catch (
    error
  ) {


    console.error(
      error
    );


    document
      .getElementById(
        'errorMessage'
      )
      .textContent =
      'アップロードに失敗しました。通信環境を確認して、もう一度お試しください。';


    document
      .getElementById(
        'uploadStatus'
      )
      .textContent =
      'アップロードを停止しました。';


  }

}



/* =========================================================
   写真：3枚並列
========================================================= */


async function uploadPhotos(

  photos,

  progressMap,

  onComplete,

  updateProgress

) {


  let currentIndex =
    0;


  async function worker() {


    while (
      true
    ) {


      const index =
        currentIndex;


      currentIndex++;


      if (
        index
        >=
        photos.length
      ) {

        return;

      }


      const file =
        photos[
          index
        ];


      const fakeController =
        startPhotoFakeProgress(

          file,

          progressMap,

          updateProgress

        );


      try {


        const base64 =
          await fileToBase64(
            file
          );


        await uploadPhotoToAppsScript(

          base64,

          file.name,

          file.type

        );


        fakeController.stop();


        progressMap.set(

          file,

          file.size

        );


        onComplete();


      } catch (
        error
      ) {


        fakeController.stop();


        throw error;


      }


    }

  }


  const workers =
    [];


  const count =
    Math.min(

      PHOTO_PARALLEL_UPLOADS,

      photos.length

    );


  for (

    let i =
      0;

    i <
    count;

    i++

  ) {


    workers.push(
      worker()
    );


  }


  await Promise.all(
    workers
  );

}



/* =========================================================
   写真疑似進捗
========================================================= */


function startPhotoFakeProgress(

  file,

  progressMap,

  updateProgress

) {


  let stopped =
    false;


  let currentRatio =
    0;


  const timer =
    setInterval(

      () => {


        if (
          stopped
        ) {

          return;

        }


        const remaining =

          0.95

          -

          currentRatio;


        currentRatio +=

          Math.max(

            0.003,

            remaining
            *
            0.08

          );


        currentRatio =
          Math.min(

            0.95,

            currentRatio

          );


        progressMap.set(

          file,

          file.size
          *
          currentRatio

        );


        updateProgress();


      },

      300

    );


  return {

    stop() {


      stopped =
        true;


      clearInterval(
        timer
      );


    }

  };

}



/* =========================================================
   写真 → Apps Script
========================================================= */


function fileToBase64(
  file
) {


  return new Promise(

    (
      resolve,
      reject
    ) => {


      const reader =
        new FileReader();


      reader.onload =
        () => {


          resolve(

            reader
              .result
              .split(',')[1]

          );


        };


      reader.onerror =
        reject;


      reader.readAsDataURL(
        file
      );


    }

  );

}



async function uploadPhotoToAppsScript(

  base64,

  fileName,

  mimeType

) {


  const body =
    new URLSearchParams();


  body.append(
    'action',
    'upload'
  );


  body.append(
    'fileData',
    base64
  );


  body.append(
    'fileName',
    fileName
  );


  body.append(
    'mimeType',
    mimeType
  );


  body.append(
    'uploaderId',
    UPLOADER_ID
  );


  await fetch(

    APPS_SCRIPT_URL,

    {

      method:
        'POST',

      mode:
        'no-cors',

      headers: {

        'Content-Type':
          'application/x-www-form-urlencoded'

      },

      body:
        body.toString()

    }

  );

}



/* =========================================================
   動画 Multipart Upload
========================================================= */


async function uploadVideoMultipart(

  file,

  onProgress

) {


  const createResponse =
    await fetch(

      WORKER_URL

      +

      '/multipart/create',

      {

        method:
          'POST',

        headers: {

          'Content-Type':
            'application/json'

        },

        body:
          JSON.stringify({

            fileName:
              file.name,

            mimeType:
              file.type,

            fileSize:
              file.size,

            uploaderId:
              UPLOADER_ID

          })

      }

    );


  if (
    !createResponse.ok
  ) {


    throw new Error(
      'Multipart upload creation failed'
    );


  }


  const createResult =
    await createResponse
      .json();


  const key =
    createResult.key;


  const uploadId =
    createResult.uploadId;


  const parts =
    [];


  let uploadedBeforeCurrentPart =
    0;


  try {


    let partNumber =
      1;


    for (

      let start =
        0;

      start <
      file.size;

      start +=
      VIDEO_CHUNK_SIZE

    ) {


      const end =
        Math.min(

          start

          +

          VIDEO_CHUNK_SIZE,

          file.size

        );


      const chunk =
        file.slice(

          start,

          end

        );


      const uploadedPart =
        await uploadVideoPart(

          key,

          uploadId,

          partNumber,

          chunk,

          loaded => {


            onProgress(

              uploadedBeforeCurrentPart

              +

              loaded

            );


          }

        );


      parts.push({

        partNumber:
          uploadedPart.partNumber,

        etag:
          uploadedPart.etag

      });


      uploadedBeforeCurrentPart +=
        chunk.size;


      onProgress(
        uploadedBeforeCurrentPart
      );


      partNumber++;


    }


    const completeResponse =
      await fetch(

        WORKER_URL

        +

        '/multipart/complete',

        {

          method:
            'POST',

          headers: {

            'Content-Type':
              'application/json'

          },

          body:
            JSON.stringify({

              key:
                key,

              uploadId:
                uploadId,

              parts:
                parts

            })

        }

      );


    if (
      !completeResponse.ok
    ) {


      throw new Error(
        'Multipart complete failed'
      );


    }


    return await completeResponse
      .json();


  } catch (
    error
  ) {


    try {


      await fetch(

        WORKER_URL

        +

        '/multipart/abort',

        {

          method:
            'POST',

          headers: {

            'Content-Type':
              'application/json'

          },

          body:
            JSON.stringify({

              key:
                key,

              uploadId:
                uploadId

            })

        }

      );


    } catch (
      abortError
    ) {


      console.error(
        abortError
      );


    }


    throw error;


  }

}



/* =========================================================
   動画 Part Upload
========================================================= */


function uploadVideoPart(

  key,

  uploadId,

  partNumber,

  chunk,

  onProgress

) {


  return new Promise(

    (
      resolve,
      reject
    ) => {


      const xhr =
        new XMLHttpRequest();


      const url =

        WORKER_URL

        +

        '/multipart/upload-part'

        +

        '?key='

        +

        encodeURIComponent(
          key
        )

        +

        '&uploadId='

        +

        encodeURIComponent(
          uploadId
        )

        +

        '&partNumber='

        +

        partNumber;


      xhr.open(

        'PUT',

        url,

        true

      );


      xhr.upload
        .onprogress =
        event => {


          if (
            event.lengthComputable
          ) {


            onProgress(
              event.loaded
            );


          }


        };


      xhr.onload =
        () => {


          if (

            xhr.status
            >=
            200

            &&

            xhr.status
            <
            300

          ) {


            try {


              resolve(

                JSON.parse(
                  xhr.responseText
                )

              );


            } catch (
              error
            ) {


              reject(
                error
              );


            }


          } else {


            reject(

              new Error(

                'Part upload failed: '

                +

                xhr.status

              )

            );


          }


        };


      xhr.onerror =
        () => {


          reject(

            new Error(
              'Network error'
            )

          );


        };


      xhr.send(
        chunk
      );


    }

  );

}



/* =========================================================
   動画サムネイル生成
========================================================= */


function createVideoThumbnail(
  file
) {


  return new Promise(

    (
      resolve,
      reject
    ) => {


      const video =
        document
          .createElement(
            'video'
          );


      const url =
        URL
          .createObjectURL(
            file
          );


      video.src =
        url;


      video.muted =
        true;


      video.playsInline =
        true;


      video.preload =
        'metadata';


      const cleanup =
        () => {


          URL.revokeObjectURL(
            url
          );


          video.remove();


        };


      video.onerror =
        () => {


          cleanup();


          reject(

            new Error(
              '動画を読み込めませんでした。'
            )

          );


        };


      video.onloadedmetadata =
        () => {


          /*
           * 1秒付近
           *
           * 1秒未満の動画なら
           * 中間地点
           */

          const seekTime =

            video.duration
            >
            1

            ?

            1

            :

            Math.max(

              0,

              video.duration
              /
              2

            );


          video.currentTime =
            seekTime;


        };


      video.onseeked =
        () => {


          try {


            const canvas =
              document
                .createElement(
                  'canvas'
                );


            const maxWidth =
              640;


            const ratio =

              video.videoWidth
              >
              maxWidth

              ?

              maxWidth
              /
              video.videoWidth

              :

              1;


            canvas.width =
              Math.max(

                1,

                Math.round(

                  video.videoWidth

                  *

                  ratio

                )

              );


            canvas.height =
              Math.max(

                1,

                Math.round(

                  video.videoHeight

                  *

                  ratio

                )

              );


            const context =
              canvas
                .getContext(
                  '2d'
                );


            context.drawImage(

              video,

              0,

              0,

              canvas.width,

              canvas.height

            );


            canvas.toBlob(

              blob => {


                cleanup();


                if (
                  blob
                ) {


                  resolve(
                    blob
                  );


                } else {


                  reject(

                    new Error(
                      'サムネイル生成に失敗しました。'
                    )

                  );


                }


              },

              'image/jpeg',

              0.82

            );


          } catch (
            error
          ) {


            cleanup();


            reject(
              error
            );


          }


        };


    }

  );

}

async function openGallery() {

  );

  const loading =
    document
      .getElementById(

      );

      );

    'none';

      await Promise.all([

      results[1];


    currentGalleryMedia =
      [

        ...photos,

        ...videos

      .sort(

        (
          a,
          b
        ) => {


          return (

            b.sortTime

            -

            a.sortTime

          );


        }

      );


    loading.style.display =
      'none';


    if (
      currentGalleryMedia.length
      ===
      0
    ) {


      empty.style.display =
        'block';


      return;

    }


    renderCombinedGallery(
      currentGalleryMedia
    );


  } catch (
    error
  ) {

      error
    );


    loading.style.display =
      'none';


    empty.style.display =
      'block';


    empty.textContent =
      '読み込みに失敗しました';


  }

/* =========================================================
   Google Drive写真取得
========================================================= */


function loadDrivePhotos() {


  return new Promise(

    (
      resolve,
      reject
    ) => {


      const callbackName =

        'driveGalleryCallback_'

        +

        Date.now()

        +

        '_'

        +

        Math.random()
          .toString(36)
          .substring(2, 8);


      window[
        callbackName
      ] =

        result => {


          const script =
            document
              .getElementById(
                callbackName
              );


          if (
            script
          ) {


            script.remove();


          }


          delete window[
            callbackName
          ];


          if (

            !result

            ||

            !result.success

          ) {


            resolve(
              []
            );


            return;

          }


          const photos =

            (
              result.media

              ||

              []
            )
            .filter(

              item => {


                return (

                  item.type
                  ===
                  'image'

                  ||

                  (
                    item.mimeType
                    &&
                    item.mimeType
                      .startsWith(
                        'image/'
                      )
                  )

                );


              }

            )
            .map(

              item => {


                return {

                  uniqueId:

                    'drive:'

                    +

                    item.id,


                  source:
                    'drive',


                  type:
                    'image',


                  id:
                    item.id,


                  name:
                    item.name,


                  canDelete:
                    item.canDelete,


                  sortTime:
                    Number(

                      item.createdAt

                      ||

                      0

                    ),


                  thumbnailUrl:

                    item.thumbnailUrl

                    ||

                    (

                      'https://drive.google.com/thumbnail'

                      +

                      '?id='

                      +

                      encodeURIComponent(
                        item.id
                      )

                      +

                      '&sz=w600'

                    ),


                  previewUrl:

                    item.previewUrl

                    ||

                    (

                      'https://drive.google.com/thumbnail'

                      +

                      '?id='

                      +

                      encodeURIComponent(
                        item.id
                      )

                      +

                      '&sz=w2000'

                    ),


                  downloadUrl:

                    item.downloadUrl

                    ||

                    (

                      'https://drive.google.com/uc'

                      +

                      '?export=download'

                      +

                      '&id='

                      +

                      encodeURIComponent(
                        item.id
                      )

                    )

                };


              }

            );


          resolve(
            photos
          );


        };


      const script =
        document
          .createElement(
            'script'
          );


      script.id =
        callbackName;


      script.src =

        APPS_SCRIPT_URL

        +

        '?action=gallery'

        +

        '&uploaderId='

        +

        encodeURIComponent(
          UPLOADER_ID
        )

        +

        '&callback='

        +

        encodeURIComponent(
          callbackName
        )

        +

        '&t='

        +

        Date.now();


      script.onerror =
        () => {


          delete window[
            callbackName
          ];


          script.remove();


          reject(

            new Error(
              'Drive gallery failed'
            )

          );


        };


      document.body
        .appendChild(
          script
        );


    }

  );

}

function renderCombinedGallery(
  media
) {


  const grid =
    document
      .getElementById(
        'galleryGrid'
      );


  grid.innerHTML =
    '';


  media.forEach(

    item => {


      const element =
        document
          .createElement(
            'div'
          );


      element.className =
        'gallery-item';


      element.dataset
        .mediaId =
        item.uniqueId;


      /*
       * 選択チェック
       */

      const check =
        document
          .createElement(
            'div'
          );


      check.className =
        'selection-check';


      check.textContent =
        '✓';


      element.appendChild(
        check
      );


      /*
       * 写真
       */

      if (
        item.type ===
        'image'
      ) {


        const img =
          document
            .createElement(
              'img'
            );


        img.src =
          item.thumbnailUrl;


        img.loading =
          'lazy';


        img.onclick =
          event => {


            event.stopPropagation();


            if (
              selectionMode
            ) {


              toggleMediaSelection(
                item
              );


              return;

            }


            openImageModal(
              item.previewUrl
            );


          };


        element.appendChild(
          img
        );


      }


      /*
       * 動画
       */

      if (
        item.type ===
        'video'
      ) {


        /*
         * サムネイルあり
         */

        if (
          item.hasThumbnail
          &&
          item.thumbnailKey
        ) {


          const img =
            document
              .createElement(
                'img'
              );


          img.src =

            WORKER_URL

            +

            '/thumbnail'

            +

            '?key='

            +

            encodeURIComponent(
              item.thumbnailKey
            );


          img.loading =
            'lazy';


          img.onclick =
            event => {


              event.stopPropagation();


              if (
                selectionMode
              ) {


                toggleMediaSelection(
                  item
                );


                return;

              }


              openVideoModal(
                item.key
              );


            };


          element.appendChild(
            img
          );


        }

        /*
         * 既存動画等
         * サムネイルなし
         */

        else {


          const video =
            document
              .createElement(
                'video'
              );


          video.src =

            WORKER_URL

            +

            '/video'

            +

            '?key='

            +

            encodeURIComponent(
              item.key
            );


          video.muted =
            true;


          video.playsInline =
            true;


          video.preload =
            'metadata';


          video.onclick =
            event => {


              event.stopPropagation();


              if (
                selectionMode
              ) {


                toggleMediaSelection(
                  item
                );


                return;

              }


              openVideoModal(
                item.key
              );


            };


          element.appendChild(
            video
          );


        }


        const play =
          document
            .createElement(
              'div'
            );


        play.className =
          'gallery-video-icon';


        play.textContent =
          '▶';


        element.appendChild(
          play
        );


      }


      /*
       * 選択モード時
       * タイル全体クリック
       */

      element.onclick =
        () => {


          if (
            selectionMode
          ) {


            toggleMediaSelection(
              item
            );


          }


        };


      /*
       * 削除
       */

      if (
        item.canDelete
      ) {


        const deleteButton =
          document
            .createElement(
              'button'
            );


        deleteButton.className =
          'gallery-delete';


        deleteButton.textContent =
          '×';


        deleteButton.onclick =
          event => {


            event.stopPropagation();


            if (
              selectionMode
            ) {

              return;

            }


            if (
              item.source ===
              'drive'
            ) {


              confirmDeleteDrivePhoto(
                item.id
              );


            } else {


              confirmDeleteR2Video(
                item.key
              );


            }


          };


        element.appendChild(
          deleteButton
        );


      }


      grid.appendChild(
        element
      );


    }

  );


  updateGallerySelectionUI();

}



/* =========================================================
   ダウンロード選択モード
========================================================= */


function toggleSelectionMode() {


  if (
    selectionMode
  ) {


    cancelSelectionMode();


    return;

  }


  selectionMode =
    true;


  selectedDownloadItems
    .clear();


  updateGallerySelectionUI();

}



function cancelSelectionMode() {


  selectionMode =
    false;


  selectedDownloadItems
    .clear();


  document
    .getElementById(
      'downloadProgress'
    )
    .textContent =
    '';


  updateGallerySelectionUI();

}



function toggleMediaSelection(
  item
) {


  if (
    selectedDownloadItems
      .has(
        item.uniqueId
      )
  ) {


    selectedDownloadItems
      .delete(
        item.uniqueId
      );


  } else {


    selectedDownloadItems
      .add(
        item.uniqueId
      );


  }


  updateGallerySelectionUI();

}



function updateGallerySelectionUI() {


  const panel =
    document
      .getElementById(
        'downloadPanel'
      );


  const selectionButton =
    document
      .getElementById(
        'selectionButton'
      );


  const count =
    document
      .getElementById(
        'downloadCount'
      );


  if (
    selectionMode
  ) {


    panel.classList
      .add(
        'active'
      );


    selectionButton
      .textContent =
      '選択を終了';


  } else {


    panel.classList
      .remove(
        'active'
      );


    selectionButton
      .textContent =
      '選択してダウンロード';


  }


  count.textContent =

    selectedDownloadItems.size

    +

    '件選択中';


  document
    .querySelectorAll(
      '.gallery-item'
    )
    .forEach(

      element => {


        const mediaId =
          element.dataset
            .mediaId;


        if (
          selectionMode
        ) {


          element.classList
            .add(
              'selection-mode'
            );


        } else {


          element.classList
            .remove(
              'selection-mode'
            );


        }


        if (
          selectedDownloadItems
            .has(
              mediaId
            )
        ) {


          element.classList
            .add(
              'selected'
            );


        } else {


          element.classList
            .remove(
              'selected'
            );


        }


        /*
         * 選択中は削除ボタン非表示
         */

        const deleteButton =
          element
            .querySelector(
              '.gallery-delete'
            );


        if (
          deleteButton
        ) {


          deleteButton.style.display =

            selectionMode

            ?

            'none'

            :

            'block';


        }


      }

    );

}



/* =========================================================
   選択したものを順番にダウンロード
========================================================= */


async function downloadSelectedMedia() {


  if (
    selectedDownloadItems.size
    ===
    0
  ) {


    alert(
      'ダウンロードする写真・動画を選択してください。'
    );


    return;

  }


  const items =

    currentGalleryMedia
      .filter(

        item =>

          selectedDownloadItems
            .has(
              item.uniqueId
            )

      );


  const progress =
    document
      .getElementById(
        'downloadProgress'
      );


  progress.textContent =

    items.length

    +

    '件のダウンロードを開始します...';


  /*
   * スマホブラウザでは
   * 複数同時ダウンロードがブロックされやすいため
   * 1件ずつ順番に実行
   */

  for (

    let i =
      0;

    i <
    items.length;

    i++

  ) {


    const item =
      items[i];


    progress.textContent =

      items.length

      +

      '件中 '

      +

      (

        i

        +

        1

      )

      +

      '件をダウンロードしています...';


    triggerDownload(
      item
    );


    /*
     * 次のダウンロードまで待機
     */

    await sleep(
      900
    );


  }


  progress.textContent =

    'ダウンロード処理を開始しました。';


  /*
   * ブラウザによっては
   * 複数ダウンロードの許可確認が表示される
   */

}



function triggerDownload(
  item
) {


  const anchor =
    document
      .createElement(
        'a'
      );


  anchor.href =
    item.downloadUrl;


  /*
   * download属性は
   * クロスオリジンでは
   * 無視される場合がある
   */

  anchor.download =
    item.name

    ||

    'wedding-media';


  anchor.target =
    '_blank';


  anchor.rel =
    'noopener';


  document.body
    .appendChild(
      anchor
    );


  anchor.click();


  setTimeout(

    () => {


      anchor.remove();


    },

    1000

  );

}



/* =========================================================
   Google Drive写真削除
========================================================= */


function confirmDeleteDrivePhoto(
  fileId
) {


  if (

    !window.confirm(

      'この写真を削除しますか？\n\n削除後はギャラリーから表示されなくなります。'

    )

  ) {


    return;

  }


  const callbackName =

    'deleteDriveCallback_'

    +

    Date.now()

    +

    '_'

    +

    Math.random()
      .toString(36)
      .substring(2, 8);


  window[
    callbackName
  ] =

    result => {


      const script =
        document
          .getElementById(
            callbackName
          );


      if (
        script
      ) {


        script.remove();


      }


      delete window[
        callbackName
      ];


      if (

        !result

        ||

        !result.success

      ) {


        alert(

          result
          &&
          result.message

          ?

          result.message

          :

          '削除に失敗しました。'

        );


        return;

      }


      openGallery();


    };


  const script =
    document
      .createElement(
        'script'
      );


  script.id =
    callbackName;


  script.src =

    APPS_SCRIPT_URL

    +

    '?action=delete'

    +

    '&fileId='

    +

    encodeURIComponent(
      fileId
    )

    +

    '&uploaderId='

    +

    encodeURIComponent(
      UPLOADER_ID
    )

    +

    '&callback='

    +

    encodeURIComponent(
      callbackName
    )

    +

    '&t='

    +

    Date.now();


  document.body
    .appendChild(
      script
    );

}



/* =========================================================
   R2動画削除
========================================================= */


async function confirmDeleteR2Video(
  key
) {


  if (

    !window.confirm(

      'この動画を削除しますか？\n\n削除後はギャラリーから表示されなくなります。'

    )

  ) {


    return;

  }


  try {


    const response =
      await fetch(

        WORKER_URL

        +

        '/video/delete',

        {

          method:
            'POST',

          headers: {

            'Content-Type':
              'application/json'

          },

          body:
            JSON.stringify({

              key:
                key,

              uploaderId:
                UPLOADER_ID

            })

        }

      );


    const result =
      await response
        .json();


    if (

      !response.ok

      ||

      !result.success

    ) {


      throw new Error(

        result.message

        ||

        'Delete failed'

      );


    }


    openGallery();


  } catch (
    error
  ) {


    console.error(
      error
    );


    alert(
      '動画の削除に失敗しました。'
    );


  }

}



/* =========================================================
   写真モーダル
========================================================= */


function openImageModal(
  imageUrl
) {


  document
    .getElementById(
      'modalImage'
    )
    .src =
    imageUrl;


  document
    .getElementById(
      'imageModal'
    )
    .classList
    .add(
      'active'
    );

}



function closeImageModal() {


  document
    .getElementById(
      'imageModal'
    )
    .classList
    .remove(
      'active'
    );

}



function closeImageModalBackground(
  event
) {


  if (
    event.target.id
    ===

  ) {

  }

}



/* =========================================================
   動画モーダル
========================================================= */


function openVideoModal(
  key
) {


  const player =
    document
      .getElementById(
        'videoPlayer'
      );


  player.src =

    WORKER_URL

    +

    '/video'

    +

    '?key='

    +

    encodeURIComponent(
      key
    );


  document
    .getElementById(
      'videoModal'
    )
    .classList
    .add(
      'active'
    );


  player.load();

}



function closeVideoModal() {


  const player =
    document
      .getElementById(
        'videoPlayer'
      );


  player.pause();


  player.removeAttribute(
    'src'
  );


  player.load();


  document
    .getElementById(
      'videoModal'
    )
    .classList
    .remove(
      'active'
    );

}



/* =========================================================
   その他
========================================================= */


function formatBytes(
  bytes
) {


  if (
    bytes <
    1024
  ) {


    return (

      Math.round(
        bytes
      )

      +

      ' B'

    );


  }


  const mb =

    bytes

    /

    1024

    /

    1024;


  if (
    mb <
    1024
  ) {


    return (

      mb
        .toFixed(
          1
        )

      +

      ' MB'

    );


  }


  return (

    (
      mb

      /

      1024
    )
      .toFixed(
        2
      )

    +

    ' GB'

  );

}



function sleep(
  ms
) {


  return new Promise(

    resolve => {


      setTimeout(

        resolve,

        ms

      );


    }

  );

}
