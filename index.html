<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
>

<title>
  Wedding Photo Uploader
</title>


<style>

* {
  box-sizing: border-box;
}


body {

  margin: 0;

  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Helvetica Neue",
    "Hiragino Kaku Gothic ProN",
    "Yu Gothic",
    sans-serif;

  background:
    #f8f6f1;

  color:
    #111;

}


.container {

  max-width:
    500px;

  min-height:
    100vh;

  margin:
    0 auto;

  padding:
    40px 24px;

  display:
    flex;

  flex-direction:
    column;

  justify-content:
    center;

}


.screen {

  display:
    none;

  text-align:
    center;

}


.screen.active {

  display:
    block;

}


h1 {

  font-family:
    Georgia,
    "Times New Roman",
    serif;

  font-size:
    30px;

  font-weight:
    normal;

  letter-spacing:
    1px;

  line-height:
    1.2;

  margin:
    0 0 20px;

}


.line {

  width:
    32px;

  height:
    1px;

  background:
    #111;

  margin:
    20px auto 32px;

}


p {

  font-size:
    15px;

  line-height:
    1.8;

  margin-bottom:
    30px;

}


button {

  width:
    100%;

  border:
    none;

  border-radius:
    8px;

  padding:
    17px 20px;

  font-size:
    16px;

  cursor:
    pointer;

}


.primary {

  background:
    #111;

  color:
    #fff;

}


.secondary {

  margin-top:
    12px;

  background:
    transparent;

  color:
    #111;

  border:
    1px solid #111;

}


.note {

  font-size:
    12px;

  margin-top:
    18px;

  color:
    #666;

}


#fileInput {

  display:
    none;

}


/* =========================
   写真選択
========================= */


.photo-grid {

  display:
    grid;

  grid-template-columns:
    repeat(
      3,
      1fr
    );

  gap:
    8px;

  margin:
    24px 0;

}


.photo-item {

  position:
    relative;

  aspect-ratio:
    1 / 1;

  overflow:
    hidden;

  border-radius:
    6px;

  background:
    #ddd;

}


.photo-item img {

  width:
    100%;

  height:
    100%;

  object-fit:
    cover;

}


.delete-btn {

  position:
    absolute;

  top:
    4px;

  right:
    4px;

  width:
    28px;

  height:
    28px;

  padding:
    0;

  border-radius:
    50%;

  background:
    rgba(
      0,
      0,
      0,
      0.8
    );

  color:
    #fff;

  font-size:
    17px;

}


.count {

  margin:
    12px 0;

  font-size:
    14px;

}


/* =========================
   アップロード
========================= */


.upload-icon {

  font-size:
    60px;

  margin:
    30px 0;

}


.progress-area {

  margin:
    30px 0;

}


.progress-bar {

  width:
    100%;

  height:
    10px;

  background:
    #ddd;

  border-radius:
    10px;

  overflow:
    hidden;

}


.progress {

  width:
    0%;

  height:
    100%;

  background:
    #111;

  transition:
    width 0.3s;

}


.progress-text {

  margin-top:
    15px;

  font-size:
    18px;

}


.heart {

  font-size:
    60px;

  margin:
    30px 0;

}


.error {

  color:
    #b00020;

  font-size:
    14px;

  margin-top:
    20px;

}


/* =========================
   ギャラリー
========================= */


.gallery-grid {

  display:
    grid;

  grid-template-columns:
    repeat(
      3,
      1fr
    );

  gap:
    4px;

  margin:
    24px 0;

}


.gallery-item {

  position:
    relative;

  aspect-ratio:
    1 / 1;

  overflow:
    hidden;

  background:
    #eee;

}


.gallery-item img {

  width:
    100%;

  height:
    100%;

  object-fit:
    cover;

  display:
    block;

  cursor:
    pointer;

}


/*
 * 自分の写真だけ表示される
 * 削除ボタン
 */
.gallery-delete {

  position:
    absolute;

  top:
    5px;

  right:
    5px;

  width:
    30px;

  height:
    30px;

  padding:
    0;

  border-radius:
    50%;

  background:
    rgba(
      0,
      0,
      0,
      0.75
    );

  color:
    white;

  font-size:
    16px;

  z-index:
    10;

}


.gallery-loading,
.gallery-empty {

  padding:
    50px 0;

  font-size:
    14px;

  color:
    #666;

}


/* =========================
   モーダル
========================= */


.modal {

  display:
    none;

  position:
    fixed;

  z-index:
    1000;

  inset:
    0;

  width:
    100%;

  height:
    100%;

  background:
    rgba(
      0,
      0,
      0,
      0.95
    );

  align-items:
    center;

  justify-content:
    center;

}


.modal.active {

  display:
    flex;

}


.modal img {

  max-width:
    95%;

  max-height:
    90%;

  object-fit:
    contain;

}


.modal-close {

  position:
    absolute;

  top:
    20px;

  right:
    20px;

  width:
    44px;

  height:
    44px;

  padding:
    0;

  border-radius:
    50%;

  background:
    #fff;

  color:
    #000;

  font-size:
    25px;

  z-index:
    1001;

}

</style>

</head>


<body>


<div class="container">


<!-- =========================
     トップ
========================= -->

<section
  id="selectScreen"
  class="screen active"
>


<h1>
SHARE<br>
YOUR PHOTOS
</h1>


<div class="line"></div>


<p>
今日撮影した写真を<br>
ふたりに送ってください
</p>


<input
  type="file"
  id="fileInput"
  accept="image/*"
  multiple
>


<button
  class="primary"
  onclick="
    document
      .getElementById(
        'fileInput'
      )
      .click()
  "
>
写真を選択する
</button>


<button
  class="secondary"
  onclick="
    openGallery()
  "
>
みんなの写真を見る
</button>


<div class="note">
一度に最大30枚まで選択できます
</div>


</section>


<!-- =========================
     確認
========================= -->

<section
  id="confirmScreen"
  class="screen"
>


<h1>
SHARE<br>
YOUR PHOTOS
</h1>


<div class="line"></div>


<p>
選択した写真を確認してください
</p>


<div
  id="photoGrid"
  class="photo-grid"
>
</div>


<div
  id="photoCount"
  class="count"
>
</div>


<button
  class="secondary"
  onclick="
    document
      .getElementById(
        'fileInput'
      )
      .click()
  "
>
写真を追加する
</button>


<button
  class="primary"
  style="
    margin-top:
      12px;
  "
  onclick="
    startUpload()
  "
>
アップロードする
</button>


</section>


<!-- =========================
     アップロード
========================= -->

<section
  id="uploadScreen"
  class="screen"
>


<h1>
SHARE<br>
YOUR PHOTOS
</h1>


<div class="line"></div>


<p>
アップロード中です
</p>


<div
  class="upload-icon"
>
↑
</div>


<div
  class="progress-area"
>


<div
  class="progress-bar"
>

<div
  id="progress"
  class="progress"
>
</div>

</div>


<div
  id="progressText"
  class="progress-text"
>
0%
</div>


<div
  id="progressCount"
  class="count"
>
0枚中 0枚完了
</div>


</div>


<p>
この画面を閉じずに<br>
そのままお待ちください
</p>


<div
  id="errorMessage"
  class="error"
>
</div>


</section>


<!-- =========================
     完了
========================= -->

<section
  id="completeScreen"
  class="screen"
>


<h1>
UPLOAD<br>
COMPLETE!
</h1>


<div class="line"></div>


<p>
写真を送信しました
</p>


<div
  class="heart"
>
♡
</div>


<p>
素敵な写真を<br>
ありがとうございます！
</p>


<button
  class="primary"
  onclick="
    resetApp()
  "
>
さらに写真を送る
</button>


<button
  class="secondary"
  onclick="
    openGallery()
  "
>
みんなの写真を見る
</button>


</section>


<!-- =========================
     ギャラリー
========================= -->

<section
  id="galleryScreen"
  class="screen"
>


<h1>
PHOTO<br>
GALLERY
</h1>


<div class="line"></div>


<p>
みんなが撮影した写真
</p>


<div
  id="galleryLoading"
  class="gallery-loading"
>
写真を読み込んでいます...
</div>


<div
  id="galleryEmpty"
  class="gallery-empty"
  style="
    display:
      none;
  "
>
まだ写真がありません
</div>


<div
  id="galleryGrid"
  class="gallery-grid"
>
</div>


<button
  class="secondary"
  onclick="
    showScreen(
      'selectScreen'
    )
  "
>
トップに戻る
</button>


</section>


</div>


<!-- =========================
     拡大表示
========================= -->


<div
  id="imageModal"
  class="modal"
  onclick="
    closeModal(
      event
    )
  "
>


<button
  class="modal-close"
  onclick="
    closeImageModal()
  "
>
×
</button>


<img
  id="modalImage"
  src=""
  alt=""
>


</div>


<script>


/* ==========================================
   設定
========================================== */


const API_URL =
  'https://script.google.com/macros/s/AKfycbzIpzbY8ZUbA0z2ct2ynJBCaWHS5CUe6Fk7FqEvnerV028Pprw6xPr1uOVQfnRYXjmR/exec';


const MAX_FILES =
  30;


/**
 * 3枚並列
 */
const PARALLEL_UPLOADS =
  3;


let selectedFiles =
  [];


/* ==========================================
   投稿者ID
========================================== */


/**
 * 同じブラウザなら
 * 同じIDを使い続ける
 */
function getUploaderId() {


  const storageKey =
    'weddingUploaderId';


  let uploaderId =
    localStorage.getItem(
      storageKey
    );


  if (
    !uploaderId
  ) {


    uploaderId =
      'guest_'
      +
      Date.now()
      +
      '_'
      +
      Math.random()
        .toString(
          36
        )
        .substring(
          2,
          12
        );


    localStorage.setItem(
      storageKey,
      uploaderId
    );


  }


  return uploaderId;

}


const UPLOADER_ID =
  getUploaderId();


/* ==========================================
   写真選択
========================================== */


document
  .getElementById(
    'fileInput'
  )
  .addEventListener(
    'change',
    handleFileSelect
  );


function handleFileSelect(
  event
) {


  const files =
    Array.from(
      event.target.files
    );


  files.forEach(
    file => {


      if (
        !file.type
          .startsWith(
            'image/'
          )
      ) {

        return;

      }


      if (
        selectedFiles.length
        <
        MAX_FILES
      ) {


        selectedFiles.push(
          file
        );


      }


    }
  );


  event.target.value =
    '';


  renderPreview();

}


/* ==========================================
   プレビュー
========================================== */


function renderPreview() {


  if (
    selectedFiles.length
    ===
    0
  ) {


    showScreen(
      'selectScreen'
    );


    return;

  }


  const grid =
    document
      .getElementById(
        'photoGrid'
      );


  grid.innerHTML =
    '';


  selectedFiles.forEach(

    (
      file,
      index
    ) => {


      const item =
        document
          .createElement(
            'div'
          );


      item.className =
        'photo-item';


      const img =
        document
          .createElement(
            'img'
          );


      img.src =
        URL
          .createObjectURL(
            file
          );


      const deleteButton =
        document
          .createElement(
            'button'
          );


      deleteButton.className =
        'delete-btn';


      deleteButton.textContent =
        '×';


      deleteButton.onclick =
        () => {


          selectedFiles.splice(
            index,
            1
          );


          renderPreview();


        };


      item.appendChild(
        img
      );


      item.appendChild(
        deleteButton
      );


      grid.appendChild(
        item
      );


    }

  );


  document
    .getElementById(
      'photoCount'
    )
    .textContent =

    selectedFiles.length

    +

    '枚選択中';


  showScreen(
    'confirmScreen'
  );

}


/* ==========================================
   画面
========================================== */


function showScreen(
  screenId
) {


  document
    .querySelectorAll(
      '.screen'
    )
    .forEach(

      screen => {


        screen
          .classList
          .remove(
            'active'
          );


      }

    );


  document
    .getElementById(
      screenId
    )
    .classList
    .add(
      'active'
    );


  window.scrollTo(
    0,
    0
  );

}


/* ==========================================
   3枚並列アップロード
========================================== */


async function startUpload() {


  if (
    selectedFiles.length
    ===
    0
  ) {

    return;

  }


  showScreen(
    'uploadScreen'
  );


  document
    .getElementById(
      'errorMessage'
    )
    .textContent =
    '';


  const filesToUpload =
    [
      ...selectedFiles
    ];


  const total =
    filesToUpload.length;


  let completed =
    0;


  let currentIndex =
    0;


  let failed =
    false;


  function updateProgress() {


    const percent =
      Math.round(

        completed
        /
        total
        *
        100

      );


    document
      .getElementById(
        'progress'
      )
      .style
      .width =

      percent

      +

      '%';


    document
      .getElementById(
        'progressText'
      )
      .textContent =

      percent

      +

      '%';


    document
      .getElementById(
        'progressCount'
      )
      .textContent =

      total

      +

      '枚中 '

      +

      completed

      +

      '枚完了';


  }


  async function worker() {


    while (
      true
    ) {


      const index =
        currentIndex;


      currentIndex++;


      if (
        index
        >=
        total
      ) {

        return;

      }


      const file =
        filesToUpload[
          index
        ];


      try {


        const base64 =
          await
          fileToBase64(
            file
          );


        await
        uploadSingleFile(

          base64,

          file.name,

          file.type

        );


        completed++;


        updateProgress();


      } catch (
        error
      ) {


        console.error(
          error
        );


        failed =
          true;


        document
          .getElementById(
            'errorMessage'
          )
          .textContent =

          '一部の写真のアップロードに失敗しました。';


        return;


      }


    }

  }


  updateProgress();


  const workers =
    [];


  for (

    let i =
      0;

    i
    <
    Math.min(
      PARALLEL_UPLOADS,
      total
    );

    i++

  ) {


    workers.push(
      worker()
    );


  }


  await Promise.all(
    workers
  );


  if (
    failed
  ) {

    return;

  }


  showScreen(
    'completeScreen'
  );

}


/* ==========================================
   Base64
========================================== */


function fileToBase64(
  file
) {


  return new Promise(

    (
      resolve,
      reject
    ) => {


      const reader =
        new FileReader();


      reader.onload =
        () => {


          resolve(

            reader
              .result
              .split(
                ','
              )[1]

          );


        };


      reader.onerror =
        reject;


      reader.readAsDataURL(
        file
      );


    }

  );

}


/* ==========================================
   アップロード通信
========================================== */


async function uploadSingleFile(

  base64,

  fileName,

  mimeType

) {


  const body =
    new URLSearchParams();


  body.append(
    'action',
    'upload'
  );


  body.append(
    'fileData',
    base64
  );


  body.append(
    'fileName',
    fileName
  );


  body.append(
    'mimeType',
    mimeType
  );


  body.append(
    'uploaderId',
    UPLOADER_ID
  );


  await fetch(

    API_URL,

    {

      method:
        'POST',

      mode:
        'no-cors',

      headers: {

        'Content-Type':
          'application/x-www-form-urlencoded'

      },

      body:
        body.toString()

    }

  );

}


/* ==========================================
   ギャラリー
========================================== */


function openGallery() {


  showScreen(
    'galleryScreen'
  );


  const grid =
    document
      .getElementById(
        'galleryGrid'
      );


  const loading =
    document
      .getElementById(
        'galleryLoading'
      );


  const empty =
    document
      .getElementById(
        'galleryEmpty'
      );


  grid.innerHTML =
    '';


  loading.style.display =
    'block';


  empty.style.display =
    'none';


  const oldScript =
    document
      .getElementById(
        'galleryJsonp'
      );


  if (
    oldScript
  ) {


    oldScript.remove();


  }


  const script =
    document
      .createElement(
        'script'
      );


  script.id =
    'galleryJsonp';


  script.src =

    API_URL

    +

    '?action=gallery'

    +

    '&uploaderId='

    +

    encodeURIComponent(
      UPLOADER_ID
    )

    +

    '&callback=renderGallery'

    +

    '&t='

    +

    Date.now();


  script.onerror =
    () => {


      loading.style.display =
        'none';


      empty.style.display =
        'block';


      empty.textContent =
        '写真の読み込みに失敗しました';


    };


  document.body
    .appendChild(
      script
    );

}


/* ==========================================
   ギャラリー描画
========================================== */


function renderGallery(
  result
) {


  const grid =
    document
      .getElementById(
        'galleryGrid'
      );


  const loading =
    document
      .getElementById(
        'galleryLoading'
      );


  const empty =
    document
      .getElementById(
        'galleryEmpty'
      );


  loading.style.display =
    'none';


  if (
    !result
    ||
    !result.success
    ||
    !result.images
    ||
    result.images.length
    ===
    0
  ) {


    empty.style.display =
      'block';


    return;


  }


  result.images.forEach(

    image => {


      const item =
        document
          .createElement(
            'div'
          );


      item.className =
        'gallery-item';


      item.dataset.fileId =
        image.id;


      const img =
        document
          .createElement(
            'img'
          );


      const thumbnailUrl =

        'https://drive.google.com/thumbnail'

        +

        '?id='

        +

        encodeURIComponent(
          image.id
        )

        +

        '&sz=w600';


      img.src =
        thumbnailUrl;


      img.loading =
        'lazy';


      img.onclick =
        () => {


          openImageModal(

            'https://drive.google.com/thumbnail'

            +

            '?id='

            +

            encodeURIComponent(
              image.id
            )

            +

            '&sz=w2000'

          );


        };


      item.appendChild(
        img
      );


      /**
       * 自分の写真だけ
       * 削除ボタン
       */
      if (
        image.canDelete
      ) {


        const deleteButton =
          document
            .createElement(
              'button'
            );


        deleteButton.className =
          'gallery-delete';


        deleteButton.textContent =
          '×';


        deleteButton.onclick =
          event => {


            event.stopPropagation();


            confirmDeletePhoto(
              image.id
            );


          };


        item.appendChild(
          deleteButton
        );


      }


      grid.appendChild(
        item
      );


    }

  );

}


/* ==========================================
   写真削除
========================================== */


function confirmDeletePhoto(
  fileId
) {


  const confirmed =
    window.confirm(

      'この写真を削除しますか？\n\n削除した写真はギャラリーから表示されなくなります。'

    );


  if (
    !confirmed
  ) {


    return;


  }


  deletePhoto(
    fileId
  );

}


function deletePhoto(
  fileId
) {


  const callbackName =

    'deleteCallback_'

    +

    Date.now()

    +

    '_'

    +

    Math.random()
      .toString(
        36
      )
      .substring(
        2,
        8
      );


  window[
    callbackName
  ] =

    function(
      result
    ) {


      const script =
        document
          .getElementById(
            callbackName
          );


      if (
        script
      ) {


        script.remove();


      }


      delete window[
        callbackName
      ];


      if (
        !result
        ||
        !result.success
      ) {


        alert(

          result
          &&
          result.message

          ?

          result.message

          :

          '写真の削除に失敗しました。'

        );


        return;


      }


      /**
       * 削除成功後
       * ギャラリーを再読み込み
       */
      openGallery();


    };


  const script =
    document
      .createElement(
        'script'
      );


  script.id =
    callbackName;


  script.src =

    API_URL

    +

    '?action=delete'

    +

    '&fileId='

    +

    encodeURIComponent(
      fileId
    )

    +

    '&uploaderId='

    +

    encodeURIComponent(
      UPLOADER_ID
    )

    +

    '&callback='

    +

    encodeURIComponent(
      callbackName
    )

    +

    '&t='

    +

    Date.now();


  script.onerror =
    () => {


      alert(
        '写真の削除に失敗しました。'
      );


      delete window[
        callbackName
      ];


      script.remove();


    };


  document.body
    .appendChild(
      script
    );

}


/* ==========================================
   拡大表示
========================================== */


function openImageModal(
  imageUrl
) {


  document
    .getElementById(
      'modalImage'
    )
    .src =
    imageUrl;


  document
    .getElementById(
      'imageModal'
    )
    .classList
    .add(
      'active'
    );

}


function closeImageModal() {


  document
    .getElementById(
      'imageModal'
    )
    .classList
    .remove(
      'active'
    );


}


function closeModal(
  event
) {


  if (
    event.target.id
    ===
    'imageModal'
  ) {


    closeImageModal();


  }


}


/* ==========================================
   リセット
========================================== */


function resetApp() {


  selectedFiles =
    [];


  document
    .getElementById(
      'photoGrid'
    )
    .innerHTML =
    '';


  document
    .getElementById(
      'progress'
    )
    .style
    .width =
    '0%';


  document
    .getElementById(
      'progressText'
    )
    .textContent =
    '0%';


  document
    .getElementById(
      'progressCount'
    )
    .textContent =
    '0枚中 0枚完了';


  showScreen(
    'selectScreen'
  );


}


</script>
